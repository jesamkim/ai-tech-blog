<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="800" height="420" fill="#1a1a2e"/>
  
  <!-- 제목 -->
  <text x="400" y="35" text-anchor="middle" fill="#4fc3f7" font-size="18" font-weight="bold">LoRA: Low-Rank Adaptation</text>
  
  <!-- Full Fine-tuning 박스 -->
  <rect x="40" y="70" width="300" height="300" rx="12" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="190" y="100" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">Full Fine-tuning</text>
  
  <!-- W 행렬 (Full) -->
  <rect x="90" y="120" width="200" height="180" rx="8" fill="#0f3460" stroke="#66bb6a" stroke-width="2"/>
  <text x="190" y="215" text-anchor="middle" fill="#66bb6a" font-size="28" font-weight="bold">W</text>
  <text x="190" y="245" text-anchor="middle" fill="#e0e0e0" font-size="12">d × k = 모든 파라미터</text>
  <text x="190" y="265" text-anchor="middle" fill="#ef5350" font-size="11">예: 4096 × 4096 = 16M</text>
  
  <text x="190" y="340" text-anchor="middle" fill="#e0e0e0" font-size="11">전체 업데이트 → 메모리 폭발</text>
  
  <!-- 화살표 -->
  <line x1="340" y1="220" x2="420" y2="220" stroke="#4fc3f7" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="380" y="213" text-anchor="middle" fill="#ffd54f" font-size="11">vs</text>
  
  <!-- LoRA 박스 -->
  <rect x="420" y="70" width="340" height="300" rx="12" fill="#16213e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="590" y="100" text-anchor="middle" fill="#ab47bc" font-size="14" font-weight="bold">LoRA (Low-Rank Adaptation)</text>
  
  <!-- W 고정 -->
  <rect x="440" y="120" width="130" height="80" rx="8" fill="#0f3460" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="505" y="155" text-anchor="middle" fill="#9e9e9e" font-size="20" font-weight="bold">W</text>
  <text x="505" y="175" text-anchor="middle" fill="#9e9e9e" font-size="11">고정 (frozen)</text>
  
  <!-- + 기호 -->
  <text x="590" y="168" text-anchor="middle" fill="#4fc3f7" font-size="24" font-weight="bold">+</text>
  
  <!-- ΔW = B·A -->
  <rect x="615" y="120" width="125" height="80" rx="8" fill="#1a237e" stroke="#ab47bc" stroke-width="2"/>
  <text x="677" y="150" text-anchor="middle" fill="#ce93d8" font-size="16" font-weight="bold">ΔW = B·A</text>
  <text x="677" y="170" text-anchor="middle" fill="#e0e0e0" font-size="10">학습 가능</text>
  
  <!-- B 행렬 -->
  <rect x="460" y="230" width="70" height="100" rx="6" fill="#4a148c" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="495" y="278" text-anchor="middle" fill="#ce93d8" font-size="18" font-weight="bold">B</text>
  <text x="495" y="298" text-anchor="middle" fill="#e0e0e0" font-size="10">d × r</text>
  <text x="495" y="313" text-anchor="middle" fill="#ffd54f" font-size="10">예: 4096×8</text>
  
  <!-- A 행렬 -->
  <rect x="550" y="260" width="100" height="55" rx="6" fill="#4a148c" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="600" y="292" text-anchor="middle" fill="#ce93d8" font-size="18" font-weight="bold">A</text>
  <text x="600" y="307" text-anchor="middle" fill="#ffd54f" font-size="10">r × k (8×4096)</text>
  
  <!-- rank 표시 -->
  <text x="677" y="340" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="bold">rank r ≪ d, k</text>
  <text x="677" y="358" text-anchor="middle" fill="#66bb6a" font-size="11">65K 파라미터 (16M의 0.4%)</text>
  
  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
  </defs>
  
  <!-- 하단 비교 -->
  <text x="400" y="395" text-anchor="middle" fill="#e0e0e0" font-size="11">GPT-3 175B 기준 | 학습 파라미터 10,000배 감소 · GPU 메모리 3배 감소 (Hu et al., 2021)</text>
</svg>