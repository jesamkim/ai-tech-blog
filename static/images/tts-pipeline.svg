<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="18" fill="white" font-weight="bold">TTS 파이프라인 구조</text>

  <!-- Text Input -->
  <rect x="50" y="100" width="120" height="80" rx="8" fill="#16213e" stroke="#00d4aa" stroke-width="2"/>
  <text x="110" y="135" text-anchor="middle" font-family="monospace" font-size="14" fill="#00d4aa">Text</text>
  <text x="110" y="155" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">"안녕하세요"</text>

  <!-- Arrow 1 -->
  <path d="M 170 140 L 220 140" stroke="#555" stroke-width="2" fill="none"/>
  <polygon points="220,140 210,135 210,145" fill="#555"/>

  <!-- Acoustic Model -->
  <rect x="220" y="100" width="140" height="80" rx="8" fill="#16213e" stroke="#00a8ff" stroke-width="2"/>
  <text x="290" y="125" text-anchor="middle" font-family="monospace" font-size="12" fill="#00a8ff" font-weight="bold">Acoustic Model</text>
  <text x="290" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">Text → Acoustic</text>
  <text x="290" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">Parameters</text>

  <!-- Arrow 2 -->
  <path d="M 360 140 L 410 140" stroke="#555" stroke-width="2" fill="none"/>
  <polygon points="410,140 400,135 400,145" fill="#555"/>

  <!-- Mel-spectrogram -->
  <rect x="410" y="100" width="140" height="80" rx="8" fill="#16213e" stroke="#ffdd44" stroke-width="2"/>
  <text x="480" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffdd44" font-weight="bold">Mel-spectrogram</text>
  <text x="480" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">F0 (톤)</text>
  <text x="480" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">Formant (발음)</text>

  <!-- Arrow 3 -->
  <path d="M 550 140 L 600 140" stroke="#555" stroke-width="2" fill="none"/>
  <polygon points="600,140 590,135 590,145" fill="#555"/>

  <!-- Vocoding Model -->
  <rect x="600" y="100" width="140" height="80" rx="8" fill="#16213e" stroke="#aa88ff" stroke-width="2"/>
  <text x="670" y="125" text-anchor="middle" font-family="monospace" font-size="12" fill="#aa88ff" font-weight="bold">Vocoding Model</text>
  <text x="670" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">Parameters → </text>
  <text x="670" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">Waveform</text>

  <!-- Arrow 4 pointing down -->
  <path d="M 670 180 L 670 210" stroke="#555" stroke-width="2" fill="none"/>
  <polygon points="670,210 665,200 675,200" fill="#555"/>

  <!-- Speech Output -->
  <rect x="610" y="210" width="120" height="50" rx="8" fill="#16213e" stroke="#00ff88" stroke-width="2"/>
  <text x="670" y="233" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88" font-weight="bold">Speech</text>
  <text x="670" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">🔊 Waveform</text>

  <!-- Annotation: Why 2 stages? -->
  <text x="400" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">왜 2단계? → 음성 정보량이 너무 많아 직접 변환 어려움</text>

  <!-- Watermark -->
  <text x="15" y="288" font-family="monospace" font-size="9" fill="#555" font-weight="bold" opacity="0.6">jesamkim.github.io</text>
</svg>
