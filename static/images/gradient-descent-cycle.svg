<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
<rect width="600" height="340" fill="#FFFFFF"/>
<defs>
  <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#545B64"><polygon points="0 0, 10 3.5, 0 7"/></marker>
</defs>

<rect x="220" y="20" width="160" height="50" rx="8" fill="#E3F2FD" stroke="#147EBA" stroke-width="2"/>
<text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E">주변 경사 측정</text>

<rect x="420" y="110" width="160" height="50" rx="8" fill="#FFF3E0" stroke="#ED7100" stroke-width="2"/>
<text x="500" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#232F3E">하강 방향 선택</text>
<text x="500" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">(Gradient 반대 방향)</text>

<rect x="220" y="200" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#7AA116" stroke-width="2"/>
<text x="300" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#232F3E">한 걸음 이동</text>
<text x="300" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">(학습률만큼)</text>

<rect x="20" y="110" width="160" height="50" rx="8" fill="#F3E8FD" stroke="#8C4FFF" stroke-width="2"/>
<text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E">최저점 도달?</text>
<text x="100" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">아니면 반복!</text>

<!-- Arrows forming cycle -->
<line x1="380" y1="45" x2="416" y2="110" stroke="#545B64" stroke-width="2" marker-end="url(#arr3)"/>
<line x1="500" y1="160" x2="384" y2="200" stroke="#545B64" stroke-width="2" marker-end="url(#arr3)"/>
<line x1="220" y1="225" x2="184" y2="160" stroke="#545B64" stroke-width="2" marker-end="url(#arr3)"/>
<line x1="100" y1="110" x2="216" y2="50" stroke="#545B64" stroke-width="2" marker-end="url(#arr3)"/>

<!-- Result -->
<rect x="220" y="280" width="160" height="40" rx="20" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
<text x="300" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">✓ 학습 완료!</text>
<line x1="100" y1="160" x2="100" y2="290" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="100" y1="290" x2="216" y2="300" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr3)"/>
<text x="130" y="288" font-family="Arial, sans-serif" font-size="10" fill="#16A34A">예!</text>
</svg>