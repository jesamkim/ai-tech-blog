<svg viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="860" height="300" fill="#1a1a2e"/>
  <text x="430" y="32" text-anchor="middle" fill="#4fc3f7" font-size="17" font-weight="bold">VLM 파인튜닝 파이프라인</text>
  
  <!-- 단계 박스들 -->
  <!-- 1. 데이터 준비 -->
  <rect x="20" y="60" width="140" height="170" rx="10" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="90" y="90" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">① 데이터 준비</text>
  <text x="90" y="115" text-anchor="middle" fill="#e0e0e0" font-size="11">이미지 수집</text>
  <text x="90" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11">레이블링</text>
  <text x="90" y="151" text-anchor="middle" fill="#e0e0e0" font-size="11">대화쌍 구성</text>
  <text x="90" y="174" text-anchor="middle" fill="#ffd54f" font-size="10">최소 1,000개</text>
  <text x="90" y="190" text-anchor="middle" fill="#ffd54f" font-size="10">권장 5,000개+</text>
  <text x="90" y="210" text-anchor="middle" fill="#66bb6a" font-size="10">JSONL 포맷</text>
  
  <!-- 화살표 -->
  <path d="M162,145 L190,145" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- 2. 모델 선택 -->
  <rect x="192" y="60" width="140" height="170" rx="10" fill="#16213e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="262" y="90" text-anchor="middle" fill="#ab47bc" font-size="13" font-weight="bold">② 모델 선택</text>
  <text x="262" y="115" text-anchor="middle" fill="#e0e0e0" font-size="11">Qwen2.5-VL</text>
  <text x="262" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11">InternVL3.5</text>
  <text x="262" y="151" text-anchor="middle" fill="#e0e0e0" font-size="11">Gemma 3</text>
  <text x="262" y="174" text-anchor="middle" fill="#ffd54f" font-size="10">7B 권장</text>
  <text x="262" y="190" text-anchor="middle" fill="#ffd54f" font-size="10">(단일 GPU)</text>
  
  <!-- 화살표 -->
  <path d="M334,145 L362,145" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- 3. QLoRA 학습 -->
  <rect x="364" y="60" width="140" height="170" rx="10" fill="#16213e" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="434" y="90" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="bold">③ QLoRA 학습</text>
  <text x="434" y="115" text-anchor="middle" fill="#e0e0e0" font-size="11">4-bit 양자화</text>
  <text x="434" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11">LoRA rank 8~16</text>
  <text x="434" y="151" text-anchor="middle" fill="#e0e0e0" font-size="11">HF TRL SFTTrainer</text>
  <text x="434" y="174" text-anchor="middle" fill="#ffd54f" font-size="10">A10G 24GB GPU</text>
  <text x="434" y="190" text-anchor="middle" fill="#ffd54f" font-size="10">3~5 epochs</text>
  
  <!-- 화살표 -->
  <path d="M506,145 L534,145" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- 4. 평가 -->
  <rect x="536" y="60" width="140" height="170" rx="10" fill="#16213e" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="606" y="90" text-anchor="middle" fill="#ffd54f" font-size="13" font-weight="bold">④ 평가</text>
  <text x="606" y="115" text-anchor="middle" fill="#e0e0e0" font-size="11">Validation Loss</text>
  <text x="606" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11">F1 / Recall</text>
  <text x="606" y="151" text-anchor="middle" fill="#e0e0e0" font-size="11">Human Eval</text>
  <text x="606" y="174" text-anchor="middle" fill="#ffd54f" font-size="10">도메인별 메트릭</text>
  <text x="606" y="190" text-anchor="middle" fill="#ffd54f" font-size="10">다양성 확인</text>
  
  <!-- 화살표 -->
  <path d="M678,145 L706,145" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- 5. 배포 -->
  <rect x="708" y="60" width="132" height="170" rx="10" fill="#16213e" stroke="#ef5350" stroke-width="1.5"/>
  <text x="774" y="90" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="bold">⑤ 배포</text>
  <text x="774" y="115" text-anchor="middle" fill="#e0e0e0" font-size="11">Bedrock Nova</text>
  <text x="774" y="133" text-anchor="middle" fill="#e0e0e0" font-size="11">SageMaker EP</text>
  <text x="774" y="151" text-anchor="middle" fill="#e0e0e0" font-size="11">엣지(ONNX)</text>
  <text x="774" y="174" text-anchor="middle" fill="#ffd54f" font-size="10">LoRA 병합</text>
  <text x="774" y="190" text-anchor="middle" fill="#ffd54f" font-size="10">양자화 최적화</text>
  
  <!-- 피드백 루프 -->
  <path d="M774,232 Q774,270 434,270 Q94,270 90,232" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arr2)"/>
  <text x="434" y="285" text-anchor="middle" fill="#9e9e9e" font-size="10">프로덕션 데이터로 지속적 개선 (MLOps 루프)</text>
  
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546e7a"/>
    </marker>
  </defs>
</svg>