<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1100">
  <!-- Background -->
  <rect width="700" height="1100" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="350" y="40" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="24" fill="#4fc3f7" font-weight="bold">비디오 → 벡터 변환: 두 가지 접근법</text>

  <!-- VS Circle -->
  <circle cx="350" cy="110" r="35" fill="none" stroke="#e0e0e0" stroke-width="3"/>
  <text x="350" y="120" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="22" fill="#e0e0e0" font-weight="bold">VS</text>

  <!-- LEFT SIDE: 접근법 A - 프레임 임베딩 -->
  <text x="175" y="200" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#4fc3f7" font-weight="bold">접근법 A: 프레임 임베딩</text>

  <!-- Step 1: 비디오 -->
  <rect x="70" y="230" width="210" height="70" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="175" y="260" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">비디오</text>
  <text x="175" y="285" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">원본 영상</text>

  <!-- Arrow down -->
  <path d="M 175 300 L 175 340" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: 프레임 추출 -->
  <rect x="70" y="340" width="210" height="80" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="175" y="370" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">프레임 추출</text>
  <text x="175" y="395" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">N개 샘플링</text>
  <text x="175" y="413" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa">(예: 1fps)</text>

  <!-- Arrow down -->
  <path d="M 175 420 L 175 470" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Step 3: 이미지 임베딩 -->
  <rect x="70" y="470" width="210" height="80" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="175" y="500" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">이미지 임베딩</text>
  <text x="175" y="525" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">각 프레임을</text>
  <text x="175" y="543" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">개별 벡터로</text>

  <!-- Arrow down -->
  <path d="M 175 550 L 175 600" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Step 4: 벡터 평균 -->
  <rect x="70" y="600" width="210" height="80" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="175" y="630" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">벡터 평균</text>
  <text x="175" y="655" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">N개 벡터를</text>
  <text x="175" y="673" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">1개로 통합</text>

  <!-- Arrow down -->
  <path d="M 175 680 L 175 730" stroke="#4fc3f7" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Step 5: 비디오 벡터 (손실) -->
  <rect x="70" y="730" width="210" height="90" rx="8" fill="#2d1f1f" stroke="#ef5350" stroke-width="3"/>
  <text x="175" y="760" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#ef5350" font-weight="bold">비디오 벡터</text>
  <text x="175" y="785" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="15" fill="#ef5350">⚠ 시간 맥락 손실</text>
  <text x="175" y="808" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa">프레임 간 연결 상실</text>

  <!-- RIGHT SIDE: 접근법 B - VLM 파이프라인 -->
  <text x="525" y="200" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#66bb6a" font-weight="bold">접근법 B: VLM 파이프라인</text>

  <!-- Step 1: 비디오 -->
  <rect x="420" y="230" width="210" height="70" rx="8" fill="#16213e" stroke="#66bb6a" stroke-width="2"/>
  <text x="525" y="260" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">비디오</text>
  <text x="525" y="285" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">원본 영상</text>

  <!-- Arrow down -->
  <path d="M 525 300 L 525 340" stroke="#66bb6a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: VLM -->
  <rect x="420" y="340" width="210" height="90" rx="8" fill="#16213e" stroke="#66bb6a" stroke-width="2"/>
  <text x="525" y="370" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">비디오 언어 모델</text>
  <text x="525" y="395" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">Pegasus v1.2</text>
  <text x="525" y="418" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#66bb6a">✓ 시간 맥락 보존</text>

  <!-- Arrow down -->
  <path d="M 525 430 L 525 480" stroke="#66bb6a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 3: 텍스트 설명 -->
  <rect x="420" y="480" width="210" height="100" rx="8" fill="#16213e" stroke="#66bb6a" stroke-width="2"/>
  <text x="525" y="510" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">텍스트 설명</text>
  <text x="525" y="535" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa" style="font-style: italic">"카파도키아에서</text>
  <text x="525" y="553" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa" style="font-style: italic">열기구를 타고</text>
  <text x="525" y="571" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa" style="font-style: italic">하늘을 나는 모습..."</text>

  <!-- Arrow down -->
  <path d="M 525 580 L 525 630" stroke="#66bb6a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: 텍스트 임베딩 -->
  <rect x="420" y="630" width="210" height="80" rx="8" fill="#16213e" stroke="#66bb6a" stroke-width="2"/>
  <text x="525" y="660" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">텍스트 임베딩</text>
  <text x="525" y="685" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#aaa">Marengo Embed 3.0</text>

  <!-- Arrow down -->
  <path d="M 525 710 L 525 760" stroke="#66bb6a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: 비디오 벡터 (보존) -->
  <rect x="420" y="760" width="210" height="100" rx="8" fill="#1f2d1f" stroke="#66bb6a" stroke-width="3"/>
  <text x="525" y="790" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="18" fill="#66bb6a" font-weight="bold">비디오 벡터</text>
  <text x="525" y="815" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="15" fill="#66bb6a">✓ 의미 보존</text>
  <text x="525" y="840" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa">유사도 5~10배 향상</text>

  <!-- Bottom comparison -->
  <rect x="50" y="900" width="600" height="140" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <text x="350" y="930" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="16" fill="#ffd54f" font-weight="bold">핵심 차이점</text>
  <text x="350" y="960" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#e0e0e0">접근법 A는 프레임을 독립적으로 처리하여 <tspan fill="#ef5350">시간적 연속성을 상실</tspan>합니다.</text>
  <text x="350" y="990" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="14" fill="#e0e0e0">접근법 B는 VLM이 영상 전체를 이해하고 <tspan fill="#66bb6a">맥락을 자연어로 표현</tspan>합니다.</text>
  <text x="350" y="1020" text-anchor="middle" font-family="NanumSquareRound, sans-serif" font-size="13" fill="#aaa">결과: 검색 정확도와 의미 유사도가 크게 향상됩니다.</text>

  <!-- Watermark -->
  <text x="620" y="1085" text-anchor="end" font-family="NanumSquareRound, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.25" font-weight="bold">jesamkim.github.io</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#66bb6a"/>
    </marker>
  </defs>
</svg>
