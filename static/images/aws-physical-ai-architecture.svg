<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="monospace" font-size="20" fill="white" font-weight="bold">AWS-Based Physical AI Architecture</text>

  <!-- Layer 1: Factory Floor (Edge) -->
  <g id="layer-edge">
    <rect x="30" y="70" width="840" height="140" rx="8" fill="#16213e" stroke="#ef5350" stroke-width="2"/>
    <text x="450" y="95" text-anchor="middle" font-family="monospace" font-size="14" fill="#ef5350" font-weight="bold">Factory Floor (Edge Layer)</text>

    <!-- Cameras -->
    <rect x="50" y="110" width="130" height="80" rx="6" fill="#1a1a3e" stroke="#ef5350" stroke-width="1"/>
    <text x="115" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef5350">Vision Sensors</text>
    <text x="115" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">📷 RGB Cameras</text>
    <text x="115" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">📷 Depth Sensors</text>
    <text x="115" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">📷 Thermal Imaging</text>

    <!-- Industrial Robots -->
    <rect x="200" y="110" width="130" height="80" rx="6" fill="#1a1a3e" stroke="#ef5350" stroke-width="1"/>
    <text x="265" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef5350">Industrial Robots</text>
    <text x="265" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">🤖 6-DOF Arms</text>
    <text x="265" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">🤖 AGVs</text>
    <text x="265" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">🤖 Cobots</text>

    <!-- IoT Sensors -->
    <rect x="350" y="110" width="130" height="80" rx="6" fill="#1a1a3e" stroke="#ef5350" stroke-width="1"/>
    <text x="415" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef5350">IoT Sensors</text>
    <text x="415" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Temperature</text>
    <text x="415" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Vibration</text>
    <text x="415" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Pressure</text>

    <!-- Edge AI Gateway -->
    <rect x="500" y="110" width="350" height="80" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="2"/>
    <text x="675" y="128" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff9900" font-weight="bold">AWS IoT Greengrass V2</text>
    <text x="675" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">(Edge AI Inference Engine)</text>

    <text x="520" y="163" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">• VLM inference (7B param, FP8)</text>
    <text x="520" y="177" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">• Local data preprocessing</text>
    <text x="685" y="163" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">• &lt;50ms latency</text>
    <text x="685" y="177" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">• Offline capability</text>
  </g>

  <!-- Arrow Up -->
  <text x="450" y="230" text-anchor="middle" font-size="20" fill="#555">↓</text>

  <!-- Layer 2: Cloud Processing -->
  <g id="layer-cloud">
    <rect x="30" y="250" width="840" height="180" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
    <text x="450" y="275" text-anchor="middle" font-family="monospace" font-size="14" fill="#4fc3f7" font-weight="bold">AWS Cloud Processing Layer</text>

    <!-- IoT Core -->
    <rect x="50" y="290" width="160" height="120" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="1"/>
    <text x="130" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9900">AWS IoT Core</text>
    <text x="130" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">• MQTT broker</text>
    <text x="130" y="345" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">• Device shadows</text>
    <text x="130" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">• Rules engine</text>
    <text x="130" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">• Fleet management</text>
    <text x="130" y="395" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Data ingestion: 500K msg/s</text>

    <!-- Bedrock VLM -->
    <rect x="230" y="290" width="200" height="120" rx="6" fill="#1a1a3e" stroke="#ab47bc" stroke-width="2"/>
    <text x="330" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#ab47bc" font-weight="bold">Amazon Bedrock</text>
    <text x="330" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Claude Sonnet 4.6 Vision</text>
    <text x="330" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Multi-modal reasoning</text>
    <text x="330" y="365" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Defect classification</text>
    <text x="330" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Anomaly explanation</text>
    <text x="330" y="395" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Serverless, pay-per-token</text>

    <!-- SageMaker AI -->
    <rect x="450" y="290" width="190" height="120" rx="6" fill="#1a1a3e" stroke="#66bb6a" stroke-width="1"/>
    <text x="545" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#66bb6a">SageMaker AI</text>
    <text x="545" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">VLA Fine-tuning</text>
    <text x="545" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Custom VLM training</text>
    <text x="545" y="365" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• LoRA adaptation</text>
    <text x="545" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Model distillation</text>
    <text x="545" y="395" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">P5.48xlarge (H100 x8)</text>

    <!-- TwinMaker -->
    <rect x="660" y="290" width="190" height="120" rx="6" fill="#1a1a3e" stroke="#ffdd44" stroke-width="1"/>
    <text x="755" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffdd44">IoT TwinMaker</text>
    <text x="755" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Digital Twin</text>
    <text x="755" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• 3D factory model</text>
    <text x="755" y="365" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• Real-time sync</text>
    <text x="755" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">• What-if scenarios</text>
    <text x="755" y="395" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Grafana integration</text>
  </g>

  <!-- Arrow Down -->
  <text x="450" y="450" text-anchor="middle" font-size="20" fill="#555">↓</text>

  <!-- Layer 3: Data & Analytics -->
  <g id="layer-data">
    <rect x="30" y="470" width="840" height="130" rx="8" fill="#16213e" stroke="#ffdd44" stroke-width="2"/>
    <text x="450" y="495" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffdd44" font-weight="bold">Data &amp; Analytics Layer</text>

    <!-- S3 Data Lake -->
    <rect x="50" y="510" width="190" height="70" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="1"/>
    <text x="145" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9900">Amazon S3</text>
    <text x="145" y="548" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Data Lake</text>
    <text x="145" y="565" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Raw sensor data</text>
    <text x="145" y="577" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Training datasets (PB-scale)</text>

    <!-- Timestream -->
    <rect x="260" y="510" width="180" height="70" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="1"/>
    <text x="350" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9900">Timestream</text>
    <text x="350" y="548" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Time-series DB</text>
    <text x="350" y="565" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Sensor metrics</text>
    <text x="350" y="577" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Equipment health scores</text>

    <!-- Kinesis -->
    <rect x="460" y="510" width="180" height="70" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="1"/>
    <text x="550" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9900">Kinesis Streams</text>
    <text x="550" y="548" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Real-time Pipeline</text>
    <text x="550" y="565" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Video streams (8K fps)</text>
    <text x="550" y="577" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Event triggers</text>

    <!-- CloudWatch -->
    <rect x="660" y="510" width="190" height="70" rx="6" fill="#1a1a3e" stroke="#ff9900" stroke-width="1"/>
    <text x="755" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9900">CloudWatch</text>
    <text x="755" y="548" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Monitoring &amp; Alerts</text>
    <text x="755" y="565" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Model performance metrics</text>
    <text x="755" y="577" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e0e0">Anomaly detection alarms</text>
  </g>

  <!-- Key Benefits Box -->
  <rect x="30" y="620" width="840" height="15" rx="4" fill="#16213e" stroke="#4fc3f7" stroke-width="1"/>
  <text x="50" y="631" text-anchor="start" font-family="monospace" font-size="9" fill="#4fc3f7" font-weight="bold">Benefits:</text>
  <text x="120" y="631" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">Edge latency &lt;50ms</text>
  <text x="260" y="631" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">Serverless scaling</text>
  <text x="390" y="631" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">Managed ML infra</text>
  <text x="530" y="631" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">99.99% uptime SLA</text>
  <text x="680" y="631" text-anchor="start" font-family="monospace" font-size="8" fill="#e0e0e0">Pay-per-use pricing</text>

  <!-- Footer -->
</svg>